name: Generate 5 Contribution SVG Animations
on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create assets & dist folder
        run: |
          mkdir -p assets
          mkdir -p dist

      # 1. 贪吃蛇
      - name: Generate Snake SVG
        uses: platane/snk@v3
        with:
          github_user_name: Lin-arm
          outputs: assets/snake.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 2. 吃豆人 + 打砖块 + 太空战机
      - name: Generate Arcade Games SVG
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: Lin-arm
          github_token: ${{ secrets.GITHUB_TOKEN }}
          games: pacman,breakout,galaga

      - name: Move games to assets
        run: |
          mv dist/pacman-contribution-graph.svg assets/pacman.svg
          mv dist/breakout-contribution-graph.svg assets/breakout.svg
          mv dist/galaga-contribution-graph.svg assets/galaga.svg

      # 3. 粒子流动动画
      - name: Generate Particle Matrix SVG
        run: curl -s "https://gh-particle.vercel.app/api?username=Lin-arm&animation=float" -o assets/particle.svg

      # 提交所有文件
      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/*.svg
          git diff --staged --quiet || (git commit -m "chore: generate 5 contribution animated svgs" && git push)
