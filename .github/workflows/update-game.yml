name: Generate 6 Contribution SVG Animations

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create assets folder
        run: mkdir -p assets

      # 1. 贪吃蛇
      - name: Generate Snake SVG
        uses: platane/snk@v3
        with:
          github_user_name: Lin-arm
          outputs: assets/snake.svg

      # 2. 吃豆人 Pacman
      - name: Generate Pacman SVG
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_username: Lin-arm
          game_type: pacman
          output_path: assets/pacman.svg

      # 3. 打砖块 Breakout
      - name: Generate Breakout SVG
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_username: Lin-arm
          game_type: breakout
          output_path: assets/breakout.svg

      # 4. 太空射击 Galaga
      - name: Generate Galaga SVG
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_username: Lin-arm
          game_type: galaga
          output_path: assets/galaga.svg

      # 5. 动态日历生长动画
      - name: Generate Animated Calendar SVG
        uses: jakejarvis/github-poster-action@master
        with:
          github_user: Lin-arm
          output: assets/calendar.svg
          args: --with-animation --animation-time=10

      # 6. 粒子流动动画
      - name: Generate Particle Matrix SVG
        run: |
          curl -s "https://gh-particle.vercel.app/api?username=Lin-arm&animation=float" -o assets/particle.svg

      # 提交所有 SVG
      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/*.svg
          git diff --staged --quiet || (git commit -m "chore: update 6 contribution svg animations" && git push)
