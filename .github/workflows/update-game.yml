name: Update Space Shooter Game

on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-game:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      # 确保 assets 目录存在
      - name: Create assets directory
        run: mkdir -p assets

      # 生成游戏动画
      - uses: czl9707/gh-space-shooter@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          output-path: 'assets/game.gif'
          strategy: 'random'

      # 转换 GIF -> SVG，并删除原 GIF
      - name: Convert GIF to SVG
        run: |
          sudo apt update && sudo apt install -y gif2svg
          gif2svg assets/game.gif assets/game.svg
          rm -f assets/game.gif

      # 提交更新
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/game.svg
          git diff --staged --quiet || (git commit -m "chore: update space shooter svg" && git push)
