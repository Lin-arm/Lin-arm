name: Update Contribution Snake SVG
on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate vector snake svg from contributions
        uses: platane/snk@v3
        id: snake
        with:
          github_user_name: Lin-arm
          outputs: assets/game.svg

      - name: Commit to repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/game.svg
          git diff --staged --quiet || (git commit -m "chore: update contribution svg" && git push)
