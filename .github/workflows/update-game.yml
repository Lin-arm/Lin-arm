name: Update Space Shooter Vector SVG
on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create assets folder
        run: mkdir -p assets

      - name: Generate space shooter vector svg
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ""
          plugin_spaceshooter: yes
          output: assets/game.svg

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/game.svg
          git diff --staged --quiet || git commit -m "chore: update space shooter svg"
          git push
