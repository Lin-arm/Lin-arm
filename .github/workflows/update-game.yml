name: Generate 6 Contribution SVG Animations
on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create assets dir
        run: mkdir -p assets

      #1 贪吃蛇
      - name: Generate Snake SVG
        uses: platane/snk@v3
        with:
          github_user_name: Lin-arm
          outputs: assets/snake.svg

      #2 吃豆人
      - name: Generate Pacman SVG
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_username: Lin-arm
          game_type: pacman
          output_path: assets/pacman.svg

      #3 打砖块
      - name: Generate Breakout SVG
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_username: Lin-arm
          game_type: breakout
          output_path: assets/breakout.svg

      #4 太空战机
      - name: Generate Galaga SVG
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_username: Lin-arm
          game_type: galaga
          output_path: assets/galaga.svg

      #5 替换：3D动态贡献日历（稳定可用，自带明暗渐变动画）
      - name: Generate 3D Animated Calendar SVG
        uses: yoshi389111/github-profile-3d-contrib@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          output-path: assets/calendar.svg

      #6 粒子浮动点阵
      - name: Generate Particle Matrix SVG
        run: curl -s "https://gh-particle.vercel.app/api?username=Lin-arm&animation=float" -o assets/particle.svg

      #统一提交所有svg
      - name: Commit & Push SVG files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/*.svg
          git diff --staged --quiet || (git commit -m "chore: update six types of contribution animated svg assets" && git push)
