name: Update Space Shooter Vector SVG
on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: 建立资源文件夹
        run: mkdir -p assets
      # 读取个人贡献记录 → 生成纯矢量SVG到assets
      - name: 生成太空射击SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ""
          plugin_spaceshooter: true
          plugin_spaceshooter_output: assets/game.svg
      # 自动提交文件
      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/game.svg
          git diff --staged --quiet || (git commit -m "chore: update shooter svg from contribution data" && git push)
