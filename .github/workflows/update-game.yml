name: ✨生成4种贡献SVG动画
on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 创建文件夹 assets & dist
        run: |
          mkdir -p assets
          mkdir -p dist

      - name: 生成 贪吃蛇SVG
        uses: platane/snk@v3
        with:
          github_user_name: Lin-arm
          outputs: assets/snake.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 生成SVG (吃豆人 & 打砖块 & 太空战机)
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: Lin-arm
          github_token: ${{ secrets.GITHUB_TOKEN }}
          games: pacman,breakout,galaga

      - name: 将生成的SVG移动到 assets
        run: |
          mv dist/pacman-contribution-graph.svg assets/pacman.svg
          mv dist/breakout-contribution-graph.svg assets/breakout.svg
          mv dist/galaga-contribution-graph.svg assets/galaga.svg

      - name: 提交所有SVG并推送到仓库
        run: |
          git config --global user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/*.svg
          git diff --staged --quiet || (git commit -m "chore: ✨生成4个稳定的贡献动画SVG" && git push)
